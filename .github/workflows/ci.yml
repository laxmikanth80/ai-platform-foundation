name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -v

  # Only builds/pushes on an actual merge to main, not on every PR — a pushed
  # image costs ECR storage, and only main is what Argo CD ever deploys.
  #
  # This job does NOT touch the cluster. It builds the image, pushes to ECR,
  # then updates the image tag in k8s/deployment.yaml and commits that change
  # back to this repo. Argo CD (running inside the cluster, watching this
  # repo) is what notices the commit and actually deploys it — see
  # argocd/application.yaml.
  build-and-push:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required to request the OIDC token
      contents: write # required to commit the updated manifest back
    steps:
      - uses: actions/checkout@v4

      # No AWS access key anywhere — this exchanges GitHub's OIDC token for
      # short-lived AWS credentials scoped to exactly the role in
      # terraform/github-oidc.tf.
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::668639472905:role/ai-platform-foundation-github-actions
          aws-region: us-east-1

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ai-platform-foundation
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Update image tag in k8s manifest
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ai-platform-foundation
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s|image: .*${ECR_REPOSITORY}:.*|image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}|" k8s/deployment.yaml

      # [skip ci] is load-bearing here, not decorative: without it, this push
      # would retrigger the `on: push: branches: [main]` trigger above, which
      # would build/push/commit again, which would retrigger again — an
      # infinite loop. GitHub natively skips creating a workflow run for any
      # commit whose message contains "[skip ci]".
      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --cached --quiet || git commit -m "Deploy ${{ github.sha }} [skip ci]"
          git push
